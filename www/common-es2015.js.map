export default "<div class=\"no-record-found-content\" *ngIf=\"data[0]==1 || data.length==0\">\n  <ion-spinner *ngIf=\"data[0]==1\"></ion-spinner>\n  <ion-row class=\"ion-no-padding\" *ngIf=\"data.length==0\">\n    <ion-col size=\"12\" class=\"ion-no-padding\">\n      <h4>{{'No Data Found'|translate}}</h4>\n    </ion-col>\n  </ion-row>\n</div>";
