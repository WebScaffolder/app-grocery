export default "<ion-card class=\"ion-no-border ion-no-margin\" *ngIf=\"data!=1\">\n  <ion-grid class=\"ion-no-padding margin-top-10\">\n    <ion-row>\n      <ion-col size=\"3\" class=\"icon_container\">\n        <div class=\"card_image_container\">\n          <ion-icon name=\"location-outline\"></ion-icon>\n        </div>\n      </ion-col>\n      <ion-col size=\"7\">\n        <ion-card-content class=\"font-bold\">\n          <p class=\"font-large\">{{data.text1}}</p>\n          <ion-card-subtitle class=\"font-medium\">{{data.text2}}</ion-card-subtitle>\n          <ion-card-subtitle class=\"font-medium\">{{data.text3}}</ion-card-subtitle>\n        </ion-card-content>\n      </ion-col>\n      <ion-col size=\"2\" class=\"icon_container\">\n        <div class=\"card_image_container\" *ngIf=\"data.selected\">\n          <ion-icon name=\"checkmark-outline\" color=\"success\"></ion-icon>\n        </div>\n      </ion-col>\n    </ion-row>\n  </ion-grid>\n</ion-card>\n\n<ion-card class=\"ion-no-border ion-no-margin\" *ngIf=\"data==1\">\n  <ion-grid>\n    <div class=\"ion-padding custom-skeleton\">\n      <ion-skeleton-text animated style=\"width: 100%\"></ion-skeleton-text>\n      <ion-skeleton-text animated></ion-skeleton-text>\n      <ion-skeleton-text animated style=\"width: 88%\"></ion-skeleton-text>\n      <ion-skeleton-text animated style=\"width: 70%\"></ion-skeleton-text>\n    </div>\n  </ion-grid>\n</ion-card>";
