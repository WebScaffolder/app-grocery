export default "<ion-grid class=\"\" [class.round-borders]=\"config.roundBordersBool\">\n  <ion-row>\n    <ion-col class=\"ion-text-center ion-padding\">\n      <ion-label (click)=\"onClickAddNewButton()\">\n        <ion-icon name=\"add-outline\"></ion-icon> {{'Add a New Address'|translate}}\n      </ion-label>\n    </ion-col>\n  </ion-row>\n</ion-grid>\n<ion-grid class=\"ion-no-padding margin-top-10\" *ngFor=\"let a of addressArray\"\n  [class.round-borders]=\"config.roundBordersBool\">\n  <ion-row>\n    <ion-col class=\"ion-no-padding\">\n      <app-address-info-card [data]=\"getAddressData(a)\" (click)=\"addOrderUserAddress(a)\">\n      </app-address-info-card>\n    </ion-col>\n  </ion-row>\n  <ion-row *ngIf=\"editButtons && a!=1\">\n    <ion-col class=\"ion-text-center\">\n      <ion-button size=\"small\" color=\"danger\" (click)=\"delete(a)\">\n        <ion-icon name=\"trash-outline\"></ion-icon>\n      </ion-button>\n      <ion-button size=\"small\" color=\"success\" (click)=\"edit(a)\">\n        <ion-icon name=\"create-outline\"></ion-icon>\n      </ion-button>\n      <ion-button size=\"small\" color=\"warning\" (click)=\"default(a)\" *ngIf=\"a.default_address==0\">\n        <ion-icon name=\"checkmark-outline\"></ion-icon>\n      </ion-button>\n    </ion-col>\n  </ion-row>\n</ion-grid>\n\n<ion-grid class=\"ion-no-padding margin-top-10\" *ngIf=\"addressArray.length==0\"\n  [class.round-borders]=\"config.roundBordersBool\">\n  <ion-row>\n    <ion-col class=\"ion-no-padding ion-text-capitalize ion-text-center\">\n      {{'no address found!'|translate}}\n    </ion-col>\n  </ion-row>\n</ion-grid>";
