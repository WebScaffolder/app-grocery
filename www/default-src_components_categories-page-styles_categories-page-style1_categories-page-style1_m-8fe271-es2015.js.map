export default "<!-- <ion-content> -->\n\n<div class=\"center\" *ngIf=\"config.homePageNumber==0\">\n  <ion-spinner></ion-spinner>\n</div>\n<ion-list>\n  <div *ngFor=\"let c of categoriesArray\">\n    <ion-item (click)=\"clickCategory(c)\" *ngIf=\"c!=1\" lines=\"none\" [class.round-borders]=\"config.roundBordersBool\" [appAnimation]=\"'fade'\">\n      <ion-img [appImageValidate]=\"70\" slot=\"start\" [src]=\"config.imgThumbnailUrlString+c.gallary\"\n        [class.round-borders]=\"config.roundBordersBool\"></ion-img>\n      <ion-label>\n        <p class=\"font-medium font-bold\">{{c.name}}</p>\n      </ion-label>\n    </ion-item>\n    <ion-row *ngIf=\"c==1\">\n      <ion-col size=\"1.7\">\n        <ion-skeleton-text animated style=\"width: 100%; height: 100%;\"></ion-skeleton-text>\n      </ion-col>\n      <ion-col size=\"10.3\">\n        <ion-label class=\"font-medium\" animated style=\"width: 100%;\">\n          <ion-skeleton-text></ion-skeleton-text>\n        </ion-label>\n      </ion-col>\n    </ion-row>\n  </div>\n</ion-list>";
