export default "<ion-card *ngIf=\"data!=1\">\n  <div class=\"card_image_container\">\n    <ion-img [appImageValidate]=\"70\" src=\"{{config.imgThumbnailUrlString+data.product_gallary.gallary_name}}\" (click)=\"openProductPage()\">\n    </ion-img>\n    <ion-fab vertical=\"top\" horizontal=\"start\" slot=\"fixed\" class=\"left-fab\">\n      <ion-badge *ngIf=\"data.product_discount_price!=0\" color=\"danger\" class=\"font-extra-small font-bold\">\n        {{'sale'|translate}}</ion-badge>\n\n      <ion-badge *ngIf=\"data.is_featured!=0\" color=\"dark\" class=\"font-extra-small font-bold\">{{'featured'|translate}}\n      </ion-badge>\n    </ion-fab>\n    <ion-fab vertical=\"top\" horizontal=\"end\" slot=\"fixed\" class=\"right-fab\" id=\"hearticon\">\n      <ion-icon [color]=\"getHeartColor()\" name=\"heart-circle-outline\" (click)=\"clickWishIcon()\"></ion-icon>\n    </ion-fab>\n  </div>\n  <ion-card-content class=\"bold font-small truncate ion-no-padding padding-horizontal-5 padding-top-5 ion-text-center\">\n    <ion-icon [name]=\"getStarIconName(1)\" [color]=\"getStarIconColor(1)\"></ion-icon>\n    <ion-icon [name]=\"getStarIconName(2)\" [color]=\"getStarIconColor(2)\"></ion-icon>\n    <ion-icon [name]=\"getStarIconName(3)\" [color]=\"getStarIconColor(3)\"></ion-icon>\n    <ion-icon [name]=\"getStarIconName(4)\" [color]=\"getStarIconColor(4)\"></ion-icon>\n    <ion-icon [name]=\"getStarIconName(5)\" [color]=\"getStarIconColor(5)\"></ion-icon>\n  </ion-card-content>\n  <ion-card-content class=\"bold font-medium truncate ion-no-padding padding-horizontal-5 ion-text-center\"\n    (click)=\"openProductPage()\">\n    <ion-text color=\"danger\"> {{data.detail[0].title}}</ion-text>\n  </ion-card-content>\n</ion-card>\n\n<ion-card *ngIf=\"data==1\">\n  <div class=\"margin-5\">\n    <ion-skeleton-text animated class=\"borders-radius-0 ion-no-margin\" style=\"height: 150px\">\n    </ion-skeleton-text>\n    <ion-skeleton-text animated style=\"width: 90%\">\n    </ion-skeleton-text>\n    <ion-skeleton-text animated style=\"width: 50%\">\n    </ion-skeleton-text>\n  </div>\n</ion-card>";
