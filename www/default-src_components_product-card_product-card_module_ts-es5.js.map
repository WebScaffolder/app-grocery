export default "<ion-card *ngIf=\"data!=1\">\n  <div class=\"card_image_container\">\n    <ion-img [appImageValidate]=\"70\" src=\"{{config.imgThumbnailUrlString+data.product_gallary.gallary_name}}\"\n      (click)=\"openProductPage()\">\n    </ion-img>\n    <ion-fab vertical=\"top\" horizontal=\"start\" slot=\"fixed\" class=\"left-fab\"\n      *ngIf=\"data.product_discount_price!=0 && discount\">\n      <ion-fab-button size=small class=\"ion-no-margin font-extra-small font-bold\">\n        <span class=\"center\">{{discount}}</span>\n      </ion-fab-button>\n    </ion-fab>\n    <!-- <ion-fab vertical=\"top\" horizontal=\"end\" slot=\"fixed\" class=\"right-fab\">\n      <ion-icon name=\"heart-circle-outline\" color=danger></ion-icon>\n    </ion-fab> -->\n    <ion-fab vertical=\"top\" horizontal=\"end\" slot=\"fixed\" class=\"right-fab\" id=\"hearticon\">\n      <ion-icon [color]=\"getHeartColor()\" name=\"heart-circle-outline\" (click)=\"clickWishIcon()\"></ion-icon>\n    </ion-fab>\n  </div>\n  <ion-card-content class=\"bold font-small truncate ion-no-padding padding-horizontal-5 padding-top-5\"\n    (click)=\"openProductPage()\">\n    {{data.detail[0].title}}\n  </ion-card-content>\n  <!-- <div *ngIf=\"data.product_type=='variable'\">\n    <ion-row class=\"ion-no-margin\">\n      <ion-col size=\"auto\" class=\"font-medium truncate ion-no-padding padding-horizontal-5 padding-bottom-5\">\n        <ion-text color=\"danger\">{{data.product_combination[0].price|curency}}\n          - {{data.product_combination[data.product_combination.length-1].price|curency}}</ion-text>\n      </ion-col>\n    </ion-row>\n  </div> -->\n  <!-- *ngIf=\"data.product_type=='simple'\" -->\n  <div>\n    <ion-row *ngIf=\"data.product_discount_price!=0\">\n      <ion-col size=\"auto\" class=\"font-medium truncate ion-no-padding padding-horizontal-5 padding-bottom-5\">\n        <ion-text color=\"danger\">{{data.product_discount_price|curency}}</ion-text>\n      </ion-col>\n      <ion-col class=\"font-medium truncate ion-no-padding padding-horizontal-5 padding-bottom-5\">\n        <ion-text class=\"line-through\">{{data.product_price|curency}}</ion-text>\n      </ion-col>\n    </ion-row>\n    <ion-row *ngIf=\"data.product_discount_price==0\">\n      <ion-col size=\"auto\" class=\"font-medium truncate ion-no-padding padding-horizontal-5 padding-bottom-5\">\n        <ion-text color=\"danger\">{{data.product_price|curency}}</ion-text>\n      </ion-col>\n    </ion-row>\n  </div>\n</ion-card>\n\n<ion-card *ngIf=\"data==1\">\n  <div class=\"margin-5\">\n    <ion-skeleton-text animated class=\"borders-radius-0 ion-no-margin\" style=\"height: 150px\">\n    </ion-skeleton-text>\n    <ion-skeleton-text animated style=\"width: 90%\">\n    </ion-skeleton-text>\n    <ion-skeleton-text animated style=\"width: 50%\">\n    </ion-skeleton-text>\n  </div>\n</ion-card>";
