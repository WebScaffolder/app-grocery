export default "<ion-header>\n  <ion-toolbar>\n    <ion-buttons slot=\"start\">\n      <ion-button fill=\"clear\" (click)=\"dismiss()\">\n        <ion-icon name=\"close\"></ion-icon>\n      </ion-button>\n    </ion-buttons>\n    <ion-title class=\"ion-no-padding\">App Logging</ion-title>\n  </ion-toolbar>\n</ion-header>\n\n<ion-content>\n  <!-- Default Segment -->\n  <ion-segment [(ngModel)]=\"segmentsTabs\">\n    <ion-segment-button value=\"log\">\n      <ion-label>Log</ion-label>\n    </ion-segment-button>\n    <ion-segment-button value=\"error\">\n      <ion-label>Error</ion-label>\n    </ion-segment-button>\n    <ion-segment-button value=\"html\">\n      <ion-label>html</ion-label>\n    </ion-segment-button>\n    <ion-segment-button value=\"translation\">\n      <ion-label>Translation</ion-label>\n    </ion-segment-button>\n  </ion-segment>\n  <div [ngSwitch]=\"segmentsTabs\">\n    <div *ngSwitchCase=\"'log'\" style=\"padding-left: 5px;\">\n      <app-app-json-tree-view [json]=\"appLogService.data\" [expanded]=\"false\">\n      </app-app-json-tree-view>\n    </div>\n    <div *ngSwitchCase=\"'error'\" style=\"padding-left: 5px;\">\n      <app-app-json-tree-view [json]=\"appLogService.dataError\" [expanded]=\"false\">\n      </app-app-json-tree-view>\n    </div>\n    <div *ngSwitchCase=\"'html'\">\n      <span [innerHTML]=\"appLogService.innerHtml\"></span>\n    </div>\n    <div *ngSwitchCase=\"'translation'\">\n      <ion-button class=\"ion-no-border font-bold\" expand=\"block\" (click)=\"appTranslationService.consoleMissingValues()\">\n        Console All Values</ion-button>\n      <app-app-json-tree-view [json]=\"appTranslationService.missingValues\" [expanded]=\"false\">\n      </app-app-json-tree-view>\n    </div>\n  </div>\n\n</ion-content>";
