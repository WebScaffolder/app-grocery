export default "<ion-header class=\"ion-no-border\">\n  <ion-toolbar>\n    <ion-icon #icon1 class=\"header-icon\" slot=\"start\" name=\"close-outline\" (click)=\"dismiss()\"></ion-icon>\n    <ion-title mode=\"ios\">{{\"Select Currency\"|translate}} </ion-title>\n  </ion-toolbar>\n</ion-header>\n<ion-content>\n  <ion-list [class.round-borders]=\"config.roundBordersBool\">\n    <ion-item *ngFor=\"let v of currencyListArray\" [color]=\"getSelectedColor(v)\" (click)=\"updateCurrency(v)\">\n      <ion-label class=\"font-medium font-bold\">{{v.title}}({{v.code}})</ion-label>\n    </ion-item>\n  </ion-list>\n</ion-content>";
