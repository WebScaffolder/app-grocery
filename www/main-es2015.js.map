export default "<ion-header class=\"ion-no-border\">\n  <ion-toolbar>\n    <ion-icon #icon1 class=\"header-icon\" slot=\"start\" name=\"close-outline\" (click)=\"dismiss()\"></ion-icon>\n    <ion-title mode=\"ios\">{{'privacy policy'|translate}} </ion-title>\n  </ion-toolbar>\n</ion-header>\n\n<ion-content>\n  <div class=\"center\" *ngIf=\"shared.privacyPolicy==''\">\n    <ion-spinner></ion-spinner>\n  </div>\n  <ion-text class=\"ion-no-padding\" *ngIf=\"shared.privacyPolicy!=''\">\n    <p [innerHTML]=\"shared.privacyPolicy\">\n    </p>\n  </ion-text>\n</ion-content>";
