export default "<ion-header class=\"ion-no-border\">\n  <ion-toolbar>\n    <ion-icon #icon1 class=\"header-icon\" slot=\"start\" name=\"close-outline\" (click)=\"dismiss()\"></ion-icon>\n    <ion-title mode=\"ios\">{{\"about us\"|translate}} </ion-title>\n  </ion-toolbar>\n</ion-header>\n\n<ion-content>\n  <div class=\"center\" *ngIf=\"shared.aboutUs==''\">\n    <ion-spinner></ion-spinner>\n  </div>\n  <ion-text class=\"ion-no-padding\" *ngIf=\"shared.aboutUs!=''\">\n    <p [innerHTML]=\"shared.aboutUs\">\n    </p>\n  </ion-text>\n  <!--  <ion-list>\n    <ion-item (click)=\"openSite()\" lines=\"full\">\n      {{\"official website\"|translate}}\n      <ion-icon name=\"chevron-forward-outline\" slot=\"end\"></ion-icon>\n    </ion-item>\n     <ion-item (click)=\"showModal('privacyPolicy')\" lines=\"full\">\n      {{'Privacy Policy'|translate}}\n      <ion-icon name=\"chevron-forward-outline\" slot=\"end\"></ion-icon>\n    </ion-item>\n    <ion-item (click)=\"showModal('refundPolicy')\" lines=\"full\">\n      {{'Refund Policy'|translate}}\n      <ion-icon name=\"chevron-forward-outline\" slot=\"end\"></ion-icon>\n    </ion-item>\n    <ion-item (click)=\"showModal('termServices')\" lines=\"none\">\n      {{'Term and Services'|translate}}\n      <ion-icon name=\"chevron-forward-outline\" slot=\"end\"></ion-icon>\n    </ion-item> \n  </ion-list>\n  -->\n</ion-content>";
