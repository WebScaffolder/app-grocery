export default "<ion-content class=\"variable-background-color\">\n  <ion-slides pager=\"true\" loop=\"true\" #introSlider class=\"ion-no-padding intro-slides\" [options]=\"sliderConfig\">\n    <ion-slide class=\"ion-no-padding\" *ngFor=\"let s of slidesArray; let i=index\">\n      <span class=\"ion-no-padding\">\n        <h1 class=\"ion-text-capitalize app-tex-color avenir-next-bold ion-text-start top-text padding-20\"\n          color=\"primary\">\n          {{s.description|translate}}\n        </h1>\n        <h1 class=\"ion-text-capitalize padding-20 avenir-next-bold ion-text-end top-text\">\n          <ion-text color=\"primary\">{{s.description2|translate}}</ion-text>\n        </h1>\n        <div class=\"image-box\">\n          <ion-img [src]=\"s.image\" class=\"center\" alt=\"Slide Images\"></ion-img>\n        </div>\n      </span>\n      <ion-grid class=\"button-grid\">\n        <ion-row>\n          <ion-col size=\"12\">\n            <ion-button color=\"primary\" *ngIf=\"slidesArray.length!=i+1\"\n              class=\"font-bold-900 ion-text-capitalize upper-button\" [class.round-borders]=\"config.roundBordersBool\"\n              (click)=\"swipeNext()\">\n              {{\"next\"|translate}}</ion-button>\n            <ion-button color=\"primary\" *ngIf=\"slidesArray.length==i+1\"\n              class=\"font-bold-900 ion-text-capitalize upper-button\" [class.round-borders]=\"config.roundBordersBool\"\n              (click)=\"dismiss()\">\n              {{\"home\"|translate}}</ion-button>\n            <br>\n            <ion-button fill=\"clear\" class=\" font-bold-900 ion-text-capitalize\"\n              style=\"text-decoration: underline; text-transform: none;\" (click)=\"dismiss()\">{{\"skip\"|translate}}\n            </ion-button>\n          </ion-col>\n        </ion-row>\n      </ion-grid>\n    </ion-slide>\n  </ion-slides>\n</ion-content>\n\n\n\n<!-- <ion-content>\n  <ion-slides pager=\"true\" #IonSlides loop=\"true\" class=\"ion-no-padding\">\n    <ion-slide #IonSlides *ngFor=\"let slide of slides; let i=index\" class=\"ion-no-padding\">\n      <span class=\"ion-no-padding\">\n        <ion-row class=\"ion-justify-content-center\">\n          <img src=\"{{slide.image}}\" alt=\"Slide Images\">\n        </ion-row>\n        <ion-row class=\"ion-justify-content-center\">\n          <ion-icon name=\"{{slide.icon}}\"></ion-icon>\n        </ion-row>\n        <ion-row class=\"ion-justify-content-center\">\n          <h2>{{slide.title|translate}}</h2>\n        </ion-row>\n       <ion-row class=\"ion-justify-content-center\">\n          <ion-col>\n            <p>{{slide.description}}</p>\n          </ion-col>\n        </ion-row> \n<ion-row>\n  <ion-button *ngIf=\"slides.length!=i+1\" (click)=\"dismiss()\" fill=\"outline\">\n    {{ 'Skip' | translate }}\n  </ion-button>\n  <ion-button *ngIf=\"slides.length==i+1\" (click)=\"dismiss()\" fill=\"outline\">\n    {{ 'Done' | translate }}\n  </ion-button>\n</ion-row>\n</span>\n</ion-slide>\n</ion-slides>\n</ion-content> -->";
