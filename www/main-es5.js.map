export default "<ion-header class=\"ion-no-border\">\n  <ion-toolbar>\n    <ion-icon #icon1 class=\"header-icon\" slot=\"start\" name=\"close-outline\" (click)=\"dismiss()\"></ion-icon>\n    <ion-title mode=\"ios\">{{'Select Language'|translate}} </ion-title>\n  </ion-toolbar>\n</ion-header>\n<ion-content>\n  <ion-list [class.round-borders]=\"config.roundBordersBool\">\n    <ion-item *ngFor=\"let l of languagesArray\" [color]=\"getSelectedColor(l)\" (click)=\"updateLanguage(l)\">\n      <ion-label class=\"font-medium font-bold\">{{l.language_name}}({{l.code}})</ion-label>\n    </ion-item>\n  </ion-list>\n</ion-content>";
