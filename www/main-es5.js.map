export default "<ion-header class=\"ion-no-border\">\n  <ion-toolbar>\n    <ion-icon #icon1 class=\"header-icon\" slot=\"start\" name=\"close\" (click)=\"dismiss(null)\"></ion-icon>\n    <ion-title mode=\"ios\">{{'Zone'|translate}}</ion-title>\n  </ion-toolbar>\n</ion-header>\n\n<ion-header class=\"ion-no-border\">\n  <ion-toolbar>\n    <ion-searchbar (ionInput)=\"getItems($event)\" name=\"search\" #Searchbar placeholder=\"{{'search'|translate}}\">\n    </ion-searchbar>\n  </ion-toolbar>\n</ion-header>\n<ion-content class=\"page-select-zones\">\n  <ion-list class=\"margin-top-10\" [class.round-borders]=\"config.roundBordersBool\">\n    <div *ngFor=\"let item of items\">\n      <ion-item (click)=\"selectZone(item)\">\n        {{ item.name }}\n      </ion-item>\n    </div>\n    <ion-item (click)=\"selectZone('other')\">\n      {{'other'|translate}}\n    </ion-item>\n  </ion-list>\n</ion-content>";
