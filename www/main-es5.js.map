export default "<ion-header class=\"ion-no-border\">\n  <ion-toolbar>\n    <ion-icon #icon1 class=\"header-icon\" slot=\"start\" name=\"arrow-back\" (click)=\"dismiss()\"></ion-icon>\n    <ion-title mode=\"ios\"> {{'forgot password'| translate }} </ion-title>\n  </ion-toolbar>\n</ion-header>\n\n<ion-content class=\"ion-padding\">\n  <form #loginForm=\"ngForm\" class=\"form\" (ngSubmit)=\"forgetPassword()\">\n    <ion-item lines=\"none\" class=\"ion-margin-bottom\">\n      <ion-icon name=\"mail-outline\" size=\"small\"></ion-icon>\n      <ion-input class=\"font-large\" placeholder=\"email@example.com\" type=\"email\" email\n        pattern=\"^\\w+([\\.-]?\\w+)*@\\w+([\\.-]?\\w+)*(\\.\\w{2,3})+$\" name=\"email\" [(ngModel)]=\"formData.email\" required>\n      </ion-input>\n    </ion-item>\n    <ion-text class=\"helptext font-small\" color=danger> * {{\"invalid email\"|translate}}</ion-text>\n    <ion-item *ngIf=\"errorMessage!=''\" lines=\"none\">\n      <ion-label>\n        {{errorMessage| translate}}\n      </ion-label>\n    </ion-item>\n\n    <ion-button disabled=\"true\" expand=\"full\" color=\"secondary\" type=\"submit\" [disabled]=\"!loginForm.form.valid\">\n      {{'Send'|translate}}\n    </ion-button>\n  </form>\n</ion-content>";
