export default "<ion-header class=\"ion-no-border\">\n  <ion-toolbar>\n    <ion-icon #icon1 class=\"header-icon\" slot=\"start\" name=\"arrow-back\" (click)=\"goBack()\"></ion-icon>\n    <ion-title mode=\"ios\">{{'address' |translate}}</ion-title>\n  </ion-toolbar>\n</ion-header>\n\n<ion-content class=\"padding-top-10\">\n  <app-add-shipping-address *ngIf=\"currentViewString!='addresslist'\" (formIschanged)=\"getFormData($event)\"\n    [editData]=\"editAddressData\">\n  </app-add-shipping-address>\n\n  <app-user-addresses *ngIf=\"currentViewString=='addresslist'\" [editButtons]=\"true\"\n    (onClickAddNew)=\"showAddNewAddressSecton()\" (onClickEditAddress)=\"onClickEditAddress($event)\">\n  </app-user-addresses>\n</ion-content>\n\n<ion-footer>\n  <ion-toolbar>\n    <ion-button class=\"font-bold\" expand=\"block\" color=\"primary\" *ngIf=\"currentViewString=='addresslist'\"\n      [disabled]=\"!appOrderService.addressIsFilled()\">\n      {{'continue'|translate}}</ion-button>\n    <ion-grid *ngIf=\"currentViewString!='addresslist'\">\n      <ion-row>\n        <ion-col size=2>\n          <ion-button fill=clear (click)=\"cancelAddAddress()\" *ngIf=\"showCancelButton()\">\n            <ion-icon slot=\"icon-only\" color=\"danger\" name=\"close-circle-outline\"></ion-icon>\n          </ion-button>\n        </ion-col>\n        <ion-col>\n          <ion-button class=\"font-bold\" expand=\"block\" color=\"primary\" [disabled]=\"disableSaveButtonBool\"\n            (click)=\"saveFormData()\">\n            {{'save'|translate}}</ion-button>\n        </ion-col>\n      </ion-row>\n    </ion-grid>\n  </ion-toolbar>\n</ion-footer>";
