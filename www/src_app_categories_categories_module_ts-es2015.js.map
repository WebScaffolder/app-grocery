export default "<ion-header class=\"ion-no-border\" *ngIf=\"config.appDesignNumber==0\">\n  <ion-toolbar>\n    <ion-icon #icon1 class=\"header-icon\" slot=\"start\" name=\"arrow-back\" (click)=\"goBack()\" *ngIf=\"getHeaderTitle()\">\n    </ion-icon>\n    <ion-icon #icon1 *ngIf=\"!getHeaderTitle()\" class=\"header-icon\" slot=\"start\" src=\"assets/icon/menu.svg\"\n      (click)=\"shared.toggleMenu()\"></ion-icon>\n    <ion-title mode=\"ios\"> {{'categories'|translate}} </ion-title>\n    <ion-icon (click)=\"openSearchPage()\" class=\"header-icon margin-horizontal-10\" slot=\"end\" name=\"search-outline\">\n    </ion-icon>\n    <ion-icon class=\"header-icon\" slot=\"end\" name=\"bag-outline\" (click)=\"appCartService.openCartPage()\"></ion-icon>\n    <ion-badge color=\"danger\" class=\"cart-badge\"><span class=\"center\">{{appCartService.cartTotalItems()}}</span>\n    </ion-badge>\n  </ion-toolbar>\n</ion-header>\n\n<ion-header class=\"ion-no-border\" *ngIf=\"config.appDesignNumber==1\">\n  <ion-toolbar color=\"primary\">\n    <ion-icon #icon1 class=\"header-icon\" slot=\"start\" name=\"arrow-back\" (click)=\"goBack()\" *ngIf=\"getHeaderTitle()\">\n    </ion-icon>\n    <ion-icon #icon1 *ngIf=\"!getHeaderTitle()\" class=\"header-icon\" slot=\"start\" src=\"assets/icon/menu.svg\"\n      (click)=\"shared.toggleMenu()\"></ion-icon>\n    <ion-title mode=\"ios\"> {{'categories'|translate}} </ion-title>\n    <ion-icon (click)=\"openSearchPage()\" class=\"header-icon margin-horizontal-10\" slot=\"end\" name=\"search-outline\">\n    </ion-icon>\n    <ion-icon class=\"header-icon\" slot=\"end\" name=\"bag-outline\" (click)=\"appCartService.openCartPage()\"></ion-icon>\n    <ion-badge color=\"danger\" class=\"cart-badge\"><span class=\"center\">{{appCartService.cartTotalItems()}}</span>\n    </ion-badge>\n  </ion-toolbar>\n</ion-header>\n\n<ion-header class=\"ion-no-border\" *ngIf=\"getHeaderTitle()\">\n  <ion-toolbar>\n    <ion-title mode=\"ios\">{{getHeaderTitle()}}</ion-title>\n  </ion-toolbar>\n</ion-header>\n\n<ion-content>\n  <app-categories-page-style1 *ngIf=\"config.categoryPageNumber==1\" [parent]=\"parentIdNumber\"\n    [dataArray]=\"getListOfCategories()\" (onClickCategory)=\"openProductPage($event)\">\n  </app-categories-page-style1>\n  <app-categories-page-style2 *ngIf=\"config.categoryPageNumber==2\" [parent]=\"parentIdNumber\"\n    [dataArray]=\"getListOfCategories()\" (onClickCategory)=\"openProductPage($event)\"></app-categories-page-style2>\n  <app-categories-page-style3 *ngIf=\"config.categoryPageNumber==3\" [parent]=\"parentIdNumber\"\n    [dataArray]=\"getListOfCategories()\" (onClickCategory)=\"openProductPage($event)\"></app-categories-page-style3>\n  <app-categories-page-style4 *ngIf=\"config.categoryPageNumber==4\" [parent]=\"parentIdNumber\"\n    [dataArray]=\"getListOfCategories()\" (onClickCategory)=\"openProductPage($event)\"></app-categories-page-style4>\n  <app-categories-page-style5 *ngIf=\"config.categoryPageNumber==5\" [parent]=\"parentIdNumber\"\n    [dataArray]=\"getListOfCategories()\" (onClickCategory)=\"openProductPage($event)\"></app-categories-page-style5>\n  <app-categories-page-style6 [parent]=\"parentIdNumber\" *ngIf=\"config.categoryPageNumber==6\"\n    [dataArray]=\"getListOfCategories()\" (onClickCategory)=\"openProductPage($event)\"></app-categories-page-style6>\n</ion-content>";
