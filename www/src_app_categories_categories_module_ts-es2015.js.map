export default "<ion-grid class=\"ion-no-padding\">\n  <ion-row class=\"ion-no-padding\">\n    <ion-col size=\"3\" *ngFor=\"let c of getListOfCategories()\" class=\"ion-no-padding\">\n      <ion-card (click)=\"clickCategory(c)\" class=\"ion-no-margin\">\n        <ion-avatar [class.round-borders]=\"config.roundBordersBool\">\n          <ion-img [appImageValidate]=\"25\" [src]=\"config.imgThumbnailUrlString+c.gallary\">\n          </ion-img>\n        </ion-avatar>\n        <ion-card-header class=\"ion-text-center ion-no-padding padding-vertical-5\">\n          <ion-card-title class=\"font-small ion-text-capitalize truncate\">{{c.name}}</ion-card-title>\n        </ion-card-header>\n      </ion-card>\n    </ion-col>\n  </ion-row>\n  <ion-button expand=\"block\" class=\"font-small ion-text-capitalize\" (click)=\"clickCategory(parentObject)\" fill=clear>\n    {{\"view all\"|translate}}</ion-button>\n</ion-grid>\n\n<!-- Scrollable Segment -->\n<ion-segment scrollable value=\"heart\" mode=ios [(ngModel)]=\"segment\">\n  <ion-segment-button value=\"{{c.id}}\" *ngFor=\"let c of categoriesArray\" [appAnimation]=\"'fade'\">\n    <ion-img [appImageValidate]=\"20\" [src]=\"config.imgThumbnailUrlString+c.icon\"></ion-img>\n    <ion-label class=\"ion-text-capitalize font-small\">{{c.name}}</ion-label>\n  </ion-segment-button>\n</ion-segment>";
