export default "<div class=\"margin-top-10\"></div>\n<div class=\"ion-no-padding top-categories ion-margin-vertical\">\n  <ion-slides [options]=\"sliderConfig\">\n    <ion-slide *ngFor=\"let c of appCategoriesService.categoriesArray\" (click)=\"onClickCategory(c)\">\n      <ion-avatar class=\"ion-no-margin\">\n        <img [appImageValidate]=\"70\" [src]=\"config.imgThumbnailUrlString+c.gallary\">\n      </ion-avatar>\n      <p class=\"font-small ion-text-capitalize truncate ion-no-margin ion-text-center\">{{c.name}}</p>\n    </ion-slide>\n  </ion-slides>\n</div>\n\n<div class=\"margin-top-10\"></div>\n<app-banner></app-banner>\n<div class=\"margin-top-10\"></div>\n<app-home-segments></app-home-segments>\n\n<!-- labels  -->\n<div class=\"heading-top-margin\"></div>\n<app-heading data=\"featured\"></app-heading>\n<div class=\"heading-bottom-margin\"></div>\n<app-products-slider filter=\"featured\"></app-products-slider>\n\n<!-- labels  -->\n<div class=\"heading-top-margin\"></div>\n<app-heading data=\"year end sale\"></app-heading>\n<div class=\"heading-bottom-margin\"></div>\n\n<!-- IMAGE ONLY -->\n<ion-grid class=\"ion-no-padding ion-no-margin\">\n  <img [appImageValidate]=\"70\" src=\"assets/Capture.png\" (click)=\"shared.openShopPage()\"\n    [class.round-borders]=\"config.roundBordersBool\" />\n</ion-grid>\n\n\n<div class=\"heading-top-margin\"></div>\n<app-heading data=\"just for you\"></app-heading>\n<div class=\"heading-bottom-margin\"></div>\n<app-home-products-list></app-home-products-list>";
