export default "<div class=\"content\">\n  <!-- <app-no-record-found [data]=\"productsArray\" *ngIf=\"productsArray.length==0\"></app-no-record-found> -->\n  <ion-slides [options]=\"sliderConfig\" *ngIf=\"productsArray.length!=0\">\n    <ion-slide *ngFor=\"let p of productsArray\">\n      <app-product-card [data]=\"p\" appFadeAnimation></app-product-card>\n    </ion-slide>\n    <ion-slide>\n      <ion-button fill=\"clear\" (click)=\"openProducts()\"> {{'Shop More'| translate}}\n        <ion-icon name=\"caret-forward\"></ion-icon>\n      </ion-button>\n    </ion-slide>\n  </ion-slides>\n</div>";
