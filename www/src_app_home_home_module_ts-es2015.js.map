export default "<div class=\"margin-top-10\"></div>\n<app-banner></app-banner>\n\n<div class=\"heading-top-margin\"></div>\n<app-heading data=\"Categories\"></app-heading>\n<div class=\"heading-bottom-margin\"></div>\n\n<app-categories-page-style5 parent=\"0\" [dataArray]=\"appCategoriesService.categoriesArray\"\n  (onClickCategory)=\"openProductPage($event)\">\n</app-categories-page-style5>\n\n<!-- labels  -->\n<div class=\"heading-top-margin\"></div>\n<app-heading data=\"year end sale\"></app-heading>\n<div class=\"heading-bottom-margin\"></div>\n\n<!-- IMAGE ONLY -->\n<ion-grid class=\"ion-no-padding ion-no-margin\">\n  <img [appImageValidate]=\"70\" src=\"assets/Capture.png\" (click)=\"shared.openShopPage()\" [class.round-borders]=\"config.roundBordersBool\"/>\n</ion-grid>\n\n<!-- labels  -->\n<div class=\"heading-top-margin\"></div>\n<app-heading data=\"featured\"></app-heading>\n<div class=\"heading-bottom-margin\"></div>\n<app-products-slider filter=\"featured\"></app-products-slider>\n\n<div class=\"heading-top-margin\"></div>\n<app-heading data=\"just for you\"></app-heading>\n<div class=\"heading-bottom-margin\"></div>\n<app-home-products-list></app-home-products-list>";
