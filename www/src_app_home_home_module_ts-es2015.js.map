export default "<div *ngIf=\"shared.bannersArray.length!=0\" class=\"content\">\n  <div *ngIf=\"shared.bannersArray[0]==1\">\n    <ion-skeleton-text animated style=\"min-height: 211px;\">\n    </ion-skeleton-text>\n  </div>\n  <div *ngIf=\"shared.bannersArray[0]!=1\">\n    \n    <ion-slides pager=\"true\" [options]=\"slideOpts\"\n      class=\"ion-no-margin ion-no-padding maze-bullet-slides\" [appAnimation]=\"'fade'\">\n      <ion-slide *ngFor=\"let b of shared.bannersArray\" class=\"ion-no-padding animate-item\" (click)=\"bannerClick(b)\">\n        <ion-img [appImageValidate]=\"150\" [appAnimation]=\"'fade'\" [class.round-borders]=\"config.roundBordersBool\" src=\"{{config.imgMediumUrlString+b.gallary}}\"></ion-img>\n      </ion-slide>\n    </ion-slides>\n  </div>\n</div>";
