export default "<div class=\"margin-top-10\"></div>\n<app-banner></app-banner>\n<div class=\"margin-top-10\"></div>\n<app-info-bar></app-info-bar>\n<!-- labels  -->\n<div class=\"heading-top-margin\"></div>\n<app-heading data=\"year end sale\"></app-heading>\n<div class=\"heading-bottom-margin\"></div>\n\n<!-- IMAGE ONLY -->\n<ion-grid class=\"ion-no-padding ion-no-margin\">\n  <img [appImageValidate]=\"70\" src=\"assets/Capture.png\" (click)=\"shared.openShopPage()\" [class.round-borders]=\"config.roundBordersBool\"/>\n</ion-grid>\n\n<!-- labels  -->\n<div class=\"heading-top-margin\"></div>\n<app-heading data=\"top rated\"></app-heading>\n<div class=\"heading-bottom-margin\"></div>\n<app-products-slider filter=\"topseller\"></app-products-slider>\n\n\n<!-- HOT ITEMS labels  -->\n<div class=\"heading-top-margin\"></div>\n<app-heading data=\"shop by category\"></app-heading>\n<div class=\"heading-bottom-margin\"></div>\n\n<!-- grid container -->\n<ion-grid class=\"ion-no-padding\" class=\"categories-grid\">\n  <ion-row class=\"ion-no-padding\">\n    <ion-col size=\"6\" *ngFor=\"let c of appCategoriesService.categoriesArray\" class=\"ion-no-padding\">\n      <ion-card (click)=\"onClickCategory(c)\" class=\"ion-no-margin\">\n        <ion-img [appImageValidate]=\"70\" [src]=\"config.imgThumbnailUrlString+c.gallary\"\n          [class.round-borders]=\"config.roundBordersBool\">\n        </ion-img>\n        <ion-card-header class=\"ion-text-center ion-no-padding padding-vertical-5\">\n          <ion-card-title class=\"font-extra-large ion-text-capitalize truncate\">{{c.name}}</ion-card-title>\n        </ion-card-header>\n      </ion-card>\n    </ion-col>\n  </ion-row>\n</ion-grid>\n\n<div class=\"heading-top-margin\"></div>\n<app-heading data=\"just for you\"></app-heading>\n<div class=\"heading-bottom-margin\"></div>\n<app-home-products-list></app-home-products-list>";
