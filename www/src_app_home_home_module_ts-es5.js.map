export default "<ion-header class=\"ion-no-border\" *ngIf=\"config.appDesignNumber==0\">\n  <ion-toolbar>\n    <ion-icon #icon1 class=\"header-icon\" (click)=\"toggleMenu()\" slot=\"start\" src=\"assets/icon/menu.svg\"></ion-icon>\n    <ion-title mode=\"ios\"><img src=\"assets/header.png\" /> </ion-title>\n    <ion-icon class=\"header-icon\" slot=\"end\" name=\"bag-outline\" (click)=\"appCartService.openCartPage()\"></ion-icon>\n    <ion-badge color=\"danger\" class=\"cart-badge\"><span class=\"center\">{{appCartService.cartTotalItems()}}</span>\n    </ion-badge>\n  </ion-toolbar>\n</ion-header>\n<ion-header class=\"ion-no-border\" *ngIf=\"config.appDesignNumber==1\">\n  <ion-toolbar color=\"primary\">\n    <ion-title mode=\"ios\"> {{config.appNameString}} </ion-title>\n    <ion-icon #icon1 class=\"header-icon\" (click)=\"toggleMenu()\" slot=\"start\" src=\"assets/icon/menu.svg\"></ion-icon>\n\n    <ion-icon (click)=\"openSearchPage()\" class=\"header-icon margin-horizontal-10\" slot=\"end\" name=\"search-outline\">\n    </ion-icon>\n    <ion-icon class=\"header-icon\" slot=\"end\" name=\"bag-outline\" (click)=\"appCartService.openCartPage()\"></ion-icon>\n    <ion-badge color=\"danger\" class=\"cart-badge\"><span class=\"center\">{{appCartService.cartTotalItems()}}</span>\n    </ion-badge>\n  </ion-toolbar>\n</ion-header>\n<ion-content>\n  <ion-row class=\"searchbar margin-vertical-10\" [class.round-borders]=\"config.roundBordersBool\"\n    *ngIf=\"config.appDesignNumber==0\">\n    <ion-searchbar (click)=\"openSearchPage()\" name=\"search\" placeholder=\"{{'What are you looking for?'|translate}}\">\n    </ion-searchbar>\n  </ion-row>\n  <div class=\"center\" *ngIf=\"config.homePageNumber==0\">\n    <ion-spinner></ion-spinner>\n  </div>\n  <app-home-page-style1 *ngIf=\"config.homePageNumber==1\"></app-home-page-style1>\n  <app-home-page-style2 *ngIf=\"config.homePageNumber==2\"></app-home-page-style2>\n  <app-home-page-style3 *ngIf=\"config.homePageNumber==3\"></app-home-page-style3>\n  <app-home-page-style4 *ngIf=\"config.homePageNumber==4\"></app-home-page-style4>\n  <app-home-page-style5 *ngIf=\"config.homePageNumber==5\"></app-home-page-style5>\n  <app-home-page-style6 *ngIf=\"config.homePageNumber==6\"></app-home-page-style6>\n  <app-home-page-style7 *ngIf=\"config.homePageNumber==7\"></app-home-page-style7>\n  <app-home-page-style8 *ngIf=\"config.homePageNumber==8\"></app-home-page-style8>\n  <app-home-page-style9 *ngIf=\"config.homePageNumber==9\"></app-home-page-style9>\n  <!-- <app-home-page-style10 *ngIf=\"config.homePageNumber==10\"></app-home-page-style10> -->\n\n</ion-content>";
