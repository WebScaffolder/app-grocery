export default "<div class=\"content\">\n  <ion-segment [(ngModel)]=\"topSegmentsString\" mode=ios class=\"app-segments\">\n    <ion-segment-button value=\"1\">\n      <ion-label class=\"font-extra-large ion-text-capitalize\">{{'top seller'| translate }}</ion-label>\n    </ion-segment-button>\n    <ion-segment-button value=\"2\">\n      <ion-label class=\"font-extra-large ion-text-capitalize\">{{'featured'| translate }}</ion-label>\n    </ion-segment-button>\n    <ion-segment-button value=\"3\">\n      <ion-label class=\"font-extra-large ion-text-capitalize\">{{'on sale'| translate }}</ion-label>\n    </ion-segment-button>\n  </ion-segment>\n  <div [ngSwitch]=\"topSegmentsString\">\n    <div *ngSwitchCase=\"'1'\">\n      <ion-grid class=\"bottom-products-grid\">\n        <ion-row>\n          <ion-col size=\"6\" *ngFor=\"let p of oneProductsArray\">\n            <app-product-card [data]=\"p\"></app-product-card>\n          </ion-col>\n        </ion-row>\n      </ion-grid>\n    </div>\n    <div *ngSwitchCase=\"'2'\">\n      <ion-grid class=\"bottom-products-grid\">\n        <ion-row>\n          <ion-col size=\"6\" *ngFor=\"let p of twoProductsArray\">\n            <app-product-card [data]=\"p\"></app-product-card>\n          </ion-col>\n        </ion-row>\n      </ion-grid>\n    </div>\n    <div *ngSwitchCase=\"'3'\">\n      <ion-grid class=\"bottom-products-grid\">\n        <ion-row>\n          <ion-col size=\"6\" *ngFor=\"let p of threeProductsArray\">\n            <app-product-card [data]=\"p\"></app-product-card>\n          </ion-col>\n        </ion-row>\n      </ion-grid>\n    </div>\n  </div>\n</div>";
