export default "<ion-header class=\"ion-no-border\">\n  <ion-toolbar>\n    <ion-icon #icon1 class=\"header-icon\" slot=\"start\" name=\"arrow-back\" (click)=\"goBack()\"></ion-icon>\n    <ion-title mode=\"ios\">{{'profile' |translate}}</ion-title>\n  </ion-toolbar>\n</ion-header>\n<ion-content>\n  <form #userForm=\"ngForm\" (ngSubmit)=\"updateInfo()\">\n    <ion-list class=\"margin-top-10 padding-top-0 padding-bottom-0 bg-transparent\" [class.round-borders]=\"config.roundBordersBool\">\n      <ion-item lines=none>\n        <ion-label position=\"stacked\">* {{'First Name'|translate}}</ion-label>\n        <ion-input placeholder=\"{{'First Name'|translate}}\" type=\"text\" [(ngModel)]=\"myAccountData.first_name\"\n          name=\"customers_first_name\" required class=\"font-medium\">\n        </ion-input>\n      </ion-item>\n      <ion-item lines=none>\n        <ion-label position=\"stacked\">* {{'Last Name'|translate}}</ion-label>\n        <ion-input placeholder=\"{{'Last Name'|translate}}\" type=\"text\" [(ngModel)]=\"myAccountData.last_name\"\n          name=\"customers_last_name\" required class=\"font-medium\">\n        </ion-input>\n      </ion-item>\n      <ion-item lines=none>\n        <ion-label position=\"stacked\">* {{'password'|translate}}</ion-label>\n        <ion-input placeholder=\"{{'password'|translate}}\" type=\"password\" [(ngModel)]=\"myAccountData.password\"\n          name=\"customers_password\" required class=\"font-medium\">\n        </ion-input>\n      </ion-item>\n      <ion-item lines=none>\n        <ion-label position=\"stacked\">* {{'confirm password'|translate}}</ion-label>\n        <ion-input placeholder=\"{{'confirm password'|translate}}\" type=\"password\"\n          [(ngModel)]=\"myAccountData.password_confirmation\" name=\"password_confirmation\" required class=\"font-medium\">\n        </ion-input>\n      </ion-item>\n      <ion-button expand=\"block\" class=\"ion-margin\" type=\"submit\" [disabled]=\"!userForm.form.valid\">{{'Update'|translate}}\n      </ion-button>\n    </ion-list>\n  </form>\n\n</ion-content>\n\n<!-- <ion-header>\n  <ion-toolbar>\n    <ion-buttons slot=\"start\">\n      <ion-back-button icon=\"arrow-back\"></ion-back-button>\n    </ion-buttons>\n    <ion-title>\n      {{'Edit Profile'| translate }}\n    </ion-title>\n\n  </ion-toolbar>\n</ion-header>\n\n<ion-content class=\"my-account-content\">\n  <form #userForm=\"ngForm\" (ngSubmit)=\"updateInfo()\">\n    <ion-item>\n      <ion-label position=\"floating\">{{'First Name'|translate}}</ion-label>\n      <ion-input type=\"text\" [(ngModel)]=\"myAccountData.customers_first_name\" name=\"customers_first_name\" required>\n      </ion-input>\n    </ion-item>\n    <ion-text class=\"helptext\"> * {{\"required\"|translate}}</ion-text>\n    <ion-item>\n      <ion-label position=\"floating\">{{'Last Name'|translate}}</ion-label>\n      <ion-input type=\"text\" [(ngModel)]=\"myAccountData.customers_last_name\" name=\"customers_last_name\" required>\n      </ion-input>\n    </ion-item>\n    <ion-text class=\"helptext\"> * {{\"required\"|translate}}</ion-text>\n    <ion-item>\n      <ion-label position=\"floating\">{{'Phone Number'|translate}}</ion-label>\n      <ion-input inputmode=\"tel\" minlength=9 maxlength=15 pattern=\"^([0-9\\(\\)\\/\\+ \\-]*)$\"\n        [(ngModel)]=\"myAccountData.customers_telephone\" name=\"phone\" required></ion-input>\n    </ion-item>\n    <ion-text class=\"helptext\"> * {{\"required\"|translate}}</ion-text>\n    <ion-button expand=\"full\" color=\"secondary\" type=\"submit\" [disabled]=\"!userForm.form.valid\">{{'Update'|translate}}\n    </ion-button>\n  </form>\n</ion-content> -->";
