export default "<ion-header class=\"ion-no-border\">\n  <ion-toolbar>\n    <ion-icon #icon1 class=\"header-icon\" slot=\"start\" name=\"arrow-back\" (click)=\"goBack()\"></ion-icon>\n    <ion-title mode=\"ios\">{{'Checkout' |translate}}</ion-title>\n  </ion-toolbar>\n</ion-header>\n<ion-content>\n\n  <ion-grid class=\"ion-no-padding variable-background-color margin-top-5\">\n    <ion-row>\n      <app-app-progress-bar [value]=\"2\"></app-app-progress-bar>\n    </ion-row>\n  </ion-grid>\n  <ion-grid class=\"heading color-dark\">\n    <ion-row>\n      <ion-col>\n        <ion-label>\n          <h2 class=\"ion-text-center font-medium ion-text-capitalize\">{{'payment method'|translate}}</h2>\n        </ion-label>\n      </ion-col>\n    </ion-row>\n  </ion-grid>\n  <div class=\"center\">\n    <ion-spinner *ngIf=\"paymentMethodsArray.length==0\"></ion-spinner>\n  </div>\n  <ion-grid class=\"list-grid\" *ngIf=\"paymentMethodsArray.length!=0\">\n    <div *ngFor=\"let p of paymentMethodsArray\">\n      <ion-row class=\"variable-background-color\" [class.round-borders]=\"config.roundBordersBool\"\n        (click)=\"selectPaymentMethod(p)\">\n        <ion-col class=\"ion-align-items-center d-flex padding-vertical-0\" id=\"cash\">\n          <ion-icon name=\"cash-outline\"></ion-icon>\n          <ion-label class=\"font-large padding-horizontal-20\">\n            {{p.payment_method_title}}</ion-label>\n        </ion-col>\n      </ion-row>\n    </div>\n  </ion-grid>\n</ion-content>";
