export default "<ion-header class=\"ion-no-border\">\n  <ion-toolbar>\n    <ion-icon #icon1 class=\"header-icon\" slot=\"start\" name=\"arrow-back\" (click)=\"goBack()\"></ion-icon>\n    <ion-title mode=\"ios\"> {{'rewards'| translate }} </ion-title>\n  </ion-toolbar>\n</ion-header>\n\n<ion-content>\n  <ion-refresher slot=\"fixed\" (ionRefresh)=\"pullRefresh()\">\n    <ion-refresher-content></ion-refresher-content>\n  </ion-refresher>\n  <ion-row class=\"ion-text-center ion-padding\">\n    <ion-col class=\"font-extra-large-2 font-bold ion-padding\">{{rewardPoints()}}<small\n        class=\"ion-text-capitalize font-bold-normal font-large points-text\">{{'points'|translate}}</small></ion-col>\n  </ion-row>\n  <ion-list>\n    <ion-item *ngFor=\"let p of pointsArray\">\n      <ion-icon name=\"gift-outline\" slot=\"start\"></ion-icon>\n      <ion-label>{{p.description}}</ion-label>\n      <ion-note slot=\"end\" color=\"danger\">{{p.points}}</ion-note>\n    </ion-item>\n  </ion-list>\n</ion-content>\n\n<ion-footer>\n  <ion-button expand=\"block\" color=\"primary\" class=\"ion-no-margin\" (click)=\"redeemPoints()\"\n    [disabled]=\"rewardPoints()==0\">\n    {{ 'Redeem' | translate }}\n  </ion-button>\n</ion-footer>";
