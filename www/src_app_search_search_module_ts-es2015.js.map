export default "<ion-header class=\"ion-no-border\">\n  <ion-toolbar>\n    <ion-icon #icon1 class=\"header-icon\" slot=\"start\" name=\"arrow-back\" (click)=\"goBack()\"></ion-icon>\n    <ion-title mode=\"ios\"> {{'search'| translate }} </ion-title>\n  </ion-toolbar>\n</ion-header>\n<ion-content>\n  <form #loginForm=\"ngForm\" (ngSubmit)=\"getSearchData()\">\n    <ion-searchbar [(ngModel)]=\"searchString\" name=\"searchString\" class=\"font-small\"\n      (ionInput)=\"onChangeKeyword($event)\" placeholder=\"{{'What are you looking for?'|translate}}\">\n    </ion-searchbar>\n  </form>\n  <ion-row class=\"ion-text-center ion-no-padding ion-padding padding-bottom-5\" *ngIf=\"searchHistoryArray.length!=0\">\n    <ion-col class=\"font-small ion-no-padding\">{{'recent searches'|translate}}</ion-col>\n  </ion-row>\n  <ion-row class=\"ion-no-padding ion-padding\" *ngIf=\"searchHistoryArray.length!=0\">\n    <ion-col class=\"ion-no-padding\">\n      <ion-badge color=\"light\"\n        class=\"font-extra-small app-tex-color ion-margin-end margin-bottom-10 padding-horizontal-10 variable-background-color\"\n        *ngFor=\"let s of searchHistoryArray\" (click)=\"recentSearchClick(s)\">\n        {{s}}\n      </ion-badge>\n    </ion-col>\n  </ion-row>\n  <ion-row class=\"ion-text-center ion-no-padding ion-padding padding-bottom-5\" *ngIf=\"searchHistoryArray.length!=0\">\n    <ion-col class=\"font-small ion-no-padding\">\n      <ion-button class=\"font-small\" fill=\"outline\" size=small color=\"danger\" (click)=\"removeAllHistory()\">\n        {{'remove'|translate}}</ion-button>\n    </ion-col>\n  </ion-row>\n</ion-content>";
