export default "<ion-tabs #appTabs (ionTabsDidChange)=\"ionChange(appTabs)\" *ngIf=\"config.appDesignNumber==0\">\n  <ion-tab-bar slot=\"bottom\">\n    <ion-tab-button tab=\"home\">\n      <ion-icon src=\"assets/icon/home.svg\"></ion-icon>\n      <ion-label>\n        <b>{{'home'|translate}}</b>\n      </ion-label>\n    </ion-tab-button>\n    <ion-tab-button tab=\"categories\">\n      <ion-icon src=\"assets/icon/category.svg\"></ion-icon>\n      <ion-label>\n        <b>{{'categories'|translate}}</b>\n      </ion-label>\n    </ion-tab-button>\n    <ion-tab-button tab=\"wish-list\">\n      <ion-icon src=\"assets/icon/heart.svg\"></ion-icon>\n      <ion-label>\n        <b>{{'wish list'|translate}}</b>\n      </ion-label>\n    </ion-tab-button>\n    <ion-tab-button tab=\"settings\">\n      <ion-icon src=\"assets/icon/setting.svg\"></ion-icon>\n      <ion-label>\n        <b>{{'account'|translate}}</b>\n      </ion-label>\n    </ion-tab-button>\n  </ion-tab-bar>\n\n</ion-tabs>\n\n<ion-tabs #appTabs (ionTabsDidChange)=\"ionChange(appTabs)\" *ngIf=\"config.appDesignNumber==1\">\n  <ion-tab-bar slot=\"bottom\">\n    <ion-tab-button tab=\"home\">\n      <ion-icon name=\"home\"></ion-icon>\n    </ion-tab-button>\n    <ion-tab-button tab=\"categories\">\n      <ion-icon name=\"apps\"></ion-icon>\n    </ion-tab-button>\n    <ion-tab-button tab=\"wish-list\">\n      <ion-icon name=\"heart\"></ion-icon>\n    </ion-tab-button>\n    <ion-tab-button tab=\"settings\">\n      <ion-icon name=\"settings\"></ion-icon>\n    </ion-tab-button>\n  </ion-tab-bar>\n\n</ion-tabs>";
