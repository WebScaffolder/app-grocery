export default "<ion-header class=\"ion-no-border bg-transparent\">\n  <ion-toolbar class=\"bg-transparent\">\n    <ion-icon #icon1 class=\"header-icon\" slot=\"start\" name=\"arrow-back\" (click)=\"goBack()\"></ion-icon>\n    <ion-title mode=\"ios\"> {{'Thank You'| translate }} </ion-title>\n  </ion-toolbar>\n</ion-header>\n\n<ion-content class=\"ion-text-capitalize\">\n  <div class=\"ion-text-center\">\n    <ion-card-content>\n      <ion-icon color=\"primary\" name=\"checkmark-circle\"></ion-icon>\n      <h3 class=\"font-extra-large-20 avenir-next-bold\">\n        <ion-text color=\"primary\">{{'congratulations'| translate }}</ion-text>\n      </h3>\n      <h4 class=\"font-large margin-bottom-20\">{{'your order has been placed'| translate }}</h4>\n      <ion-button expand=\"block\" (click)=\"openOrders()\" class=\"ion-margin-top ion-margin-horizontal\" *ngIf=\"appUserService.userIsLogedIn()\">\n        {{'my Orders'| translate }}</ion-button>\n      <ion-button class=\"ion-margin-top ion-margin-horizontal\" (click)=\"openHome()\" expand=\"block\" fill=\"outline\">\n        {{'continue shopping'| translate }}</ion-button>\n    </ion-card-content>\n  </div>\n</ion-content>";
